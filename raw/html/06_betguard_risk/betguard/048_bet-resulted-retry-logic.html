<p>BetResulted Retry Logic</p><div><p>When <a href="../documentation?currentLoc=betGuard&amp;location=bet_resulted">BetResulted</a> call fails due to communication or network, Feedcosntruct tries to resend the message. Each retry is performed after <strong>N minutes where N is the retry count</strong>. After 5 retries the message remains in the queue with “No Answer” status.</p></div>
